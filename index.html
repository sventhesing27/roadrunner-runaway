<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Roadrunner Runaway</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="panel" id="login">

<h1>ROADRUNNER RUNAWAY</h1>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="error"></p>

</div>


<div class="panel" id="adminpanel">

<h2>Adminbereich</h2>

<h3>Neuen Member erstellen</h3>

<input id="newuser" placeholder="Username">
<input id="newpass" placeholder="Password">

<button onclick="addMember()">Member erstellen</button>

<h3>Mitgliederliste</h3>

<div id="memberlist"></div>

<h3>Musik hinzufügen</h3>

<input id="musiclink" placeholder="MP3 Link">
<button onclick="addMusic()">Musik speichern</button>

<h3>Information posten</h3>

<input id="infotext" placeholder="Information">
<button onclick="postInfo()">Posten</button>

<button onclick="logout()">Logout</button>

</div>


<div class="panel" id="memberpanel">

<h2>Memberbereich</h2>

<h3>Musik</h3>

<div id="musiclist"></div>

<h3>Informationstafel</h3>

<div id="infoboard"></div>

<h3>Member Chat</h3>

<div id="chatbox"></div>

<input id="chatmsg" placeholder="Nachricht">
<button onclick="sendMessage()">Senden</button>

<button onclick="logout()">Logout</button>

</div>


<script src="script.js"></script>

</body>
</html>
