
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shelby Logistik Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#0b0b0b;--panel:#101010;--accent:#c9a06b;--muted:#bfb7ad;--glass: rgba(255,255,255,0.03);}
*{box-sizing:border-box}

body{
margin:0;
font-family:'Roboto Slab',serif;
color:var(--muted);
min-height:100vh;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

header{
padding:16px 20px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(0,0,0,0.5);
}

nav a{
color:var(--accent);
text-decoration:none;
font-weight:700;
margin-right:10px;
cursor:pointer;
}

main{
display:grid;
gap:12px;
padding:12px;
}

.card{
background:rgba(16,16,16,0.85);
border-radius:8px;
padding:12px;
}

input,select{
width:100%;
padding:6px;
margin-top:4px;
border-radius:6px;
border:1px solid rgba(255,255,255,0.04);
background:var(--glass);
color:var(--muted);
}

button{
margin-top:10px;
padding:6px 10px;
border-radius:6px;
border:0;
background:var(--accent);
color:#000;
font-weight:700;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:6px;
border-bottom:1px dashed rgba(255,255,255,0.1);
}

#loginCard{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
</style>
</head>

<body>

<div id="loginCard">
<div class="card" style="width:300px;text-align:center">
<h2>Shelby Logistik</h2>
<input id="username" placeholder="Benutzername">
<input id="password" type="password" placeholder="Passwort">
<button id="loginBtn">Login</button>
<div id="errorMsg"></div>
</div>
</div>

<div id="dashboard" style="display:none">

<header>
<nav id="navLinks"></nav>
<button onclick="logout()">Logout</button>
</header>

<main>

<section id="stats" class="card">
<h3>Statistik</h3>
<p>Inventar Einträge: <span id="statInventory">0</span></p>
<p>Mitarbeiter: <span id="statStaff">0</span></p>
<p>Links: <span id="statLinks">0</span></p>
</section>

<section id="history" class="card" style="display:none">
<h3>History</h3>
<table id="historyTable">
<thead>
<tr>
<th>Aktion</th>
<th>Datum</th>
<th>Aktion</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="inventory" class="card" style="display:none">
<h3>Inventar</h3>

<select id="invEmployee"></select>
<input id="material" placeholder="Material">
<input id="quantity" type="number" placeholder="Anzahl">
<input id="price" type="number" placeholder="Preis">

<button id="addInv">Eintragen</button>

<table id="entriesTable">
<thead>
<tr>
<th>Mitarbeiter</th>
<th>Material</th>
<th>Anzahl</th>
<th>Preis</th>
<th>Aktion</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="staff" class="card" style="display:none">
<h3>Mitarbeiter</h3>

<input id="newEmployee" placeholder="Name">
<button id="addStaff">Hinzufügen</button>

<table id="staffTable">
<thead><tr><th>Name</th><th>Aktion</th></tr></thead>
<tbody></tbody>
</table>
</section>

<section id="links" class="card" style="display:none">
<h3>Links</h3>

<input id="linkName" placeholder="Name">
<input id="linkURL" placeholder="https://link.de">

<button id="addLink">Hinzufügen</button>

<table id="linksTable">
<thead><tr><th>Name</th><th>Link</th><th>Aktion</th></tr></thead>
<tbody></tbody>
</table>
</section>

</main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAIGP9jBcFtGoPXMsz2Jm8sxNhYm6d1-sA",
authDomain: "roadrunner-runaway-86d6e.firebaseapp.com",
projectId: "roadrunner-runaway-86d6e",
storageBucket: "roadrunner-runaway-86d6e.firebasestorage.app",
messagingSenderId: "535598462149",
appId: "1:535598462149:web:8d72337fdc394b2a52acac"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const accounts=[
{user:'admin',pass:'shelby123'},
{user:'mitarbeiter',pass:'1234'},
{user:'verwalter',pass:'verwalter123'}
];

loginBtn.onclick=()=>{

const acc=accounts.find(a=>a.user===username.value && a.pass===password.value)

if(acc){

loginCard.style.display="none"
dashboard.style.display="block"

setupNav()

loadStaff()
loadInventory()
loadLinks()
loadHistory()

}else{
errorMsg.innerText="Falscher Login"
}

}

function logout(){location.reload()}

function setupNav(){

navLinks.innerHTML=""
navLinks.innerHTML+="<a onclick=\"showSection('stats')\">Statistik</a>"
navLinks.innerHTML+="<a onclick=\"showSection('inventory')\">Inventar</a>"
navLinks.innerHTML+="<a onclick=\"showSection('staff')\">Mitarbeiter</a>"
navLinks.innerHTML+="<a onclick=\"showSection('links')\">Links</a>"
navLinks.innerHTML+="<a onclick=\"showSection('history')\">History</a>"

}

function showSection(id){

["stats","inventory","staff","links","history"].forEach(s=>{
document.getElementById(s).style.display=(s===id)?"block":"none"
})

}

/* HISTORY */

function addHistory(action){

db.collection("history").add({
action:action,
date:new Date().toLocaleString()
})

}

function loadHistory(){

db.collection("history").onSnapshot(s=>{

historyTable.querySelector("tbody").innerHTML=""

s.forEach(doc=>{

const d=doc.data()

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.action}</td>
<td>${d.date}</td>
<td><button onclick="deleteHistory('${doc.id}')">Löschen</button></td>
`

historyTable.querySelector("tbody").appendChild(tr)

})

})

}

function deleteHistory(id){
db.collection("history").doc(id).delete()
}

/* STAFF */

function loadStaff(){

db.collection("staff").onSnapshot(s=>{

staffTable.querySelector("tbody").innerHTML=""
invEmployee.innerHTML=""

let count=0

s.forEach(doc=>{

const d=doc.data()
count++

const tr=document.createElement("tr")

tr.innerHTML=`<td>${d.name}</td>
<td><button onclick="deleteStaff('${doc.id}')">Löschen</button></td>`

staffTable.querySelector("tbody").appendChild(tr)

const opt=document.createElement("option")
opt.text=d.name
opt.value=d.name

invEmployee.add(opt)

})

statStaff.innerText=count

})

}

addStaff.onclick=()=>{

const n=newEmployee.value.trim()
if(!n)return

db.collection("staff").add({name:n})
addHistory("Mitarbeiter hinzugefügt: "+n)

newEmployee.value=""

}

function deleteStaff(id){

db.collection("staff").doc(id).delete()
addHistory("Mitarbeiter gelöscht")

}

/* INVENTORY */

function loadInventory(){

db.collection("inventory").onSnapshot(s=>{

entriesTable.querySelector("tbody").innerHTML=""

let count=0

s.forEach(doc=>{

const e=doc.data()
count++

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${e.employee}</td>
<td>${e.material}</td>
<td>${e.quantity}</td>
<td>${e.price}</td>
<td><button onclick="deleteInventory('${doc.id}')">Entnommen</button></td>
`

entriesTable.querySelector("tbody").appendChild(tr)

})

statInventory.innerText=count

})

}

addInv.onclick=()=>{

const e={
employee:invEmployee.value,
material:material.value,
quantity:Number(quantity.value),
price:Number(price.value)
}

db.collection("inventory").add(e)
addHistory("Inventar hinzugefügt: "+material.value)

material.value=""
quantity.value=""
price.value=""

}

function deleteInventory(id){

db.collection("inventory").doc(id).delete()
addHistory("Inventar entnommen")

}

/* LINKS */

function loadLinks(){

db.collection("links").onSnapshot(s=>{

linksTable.querySelector("tbody").innerHTML=""

let count=0

s.forEach(doc=>{

const l=doc.data()
count++

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${l.name}</td>
<td><a href="${l.url}" target="_blank">${l.url}</a></td>
<td><button onclick="deleteLink('${doc.id}')">Löschen</button></td>
`

linksTable.querySelector("tbody").appendChild(tr)

})

statLinks.innerText=count

})

}

addLink.onclick=()=>{

db.collection("links").add({
name:linkName.value,
url:linkURL.value
})

addHistory("Link hinzugefügt")

linkName.value=""
linkURL.value=""

}

function deleteLink(id){

db.collection("links").doc(id).delete()
addHistory("Link gelöscht")

}

</script>

</body>
</html>
