
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shelby Logistik Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#0b0b0b;--panel:#101010;--accent:#c9a06b;--muted:#bfb7ad;--glass: rgba(255,255,255,0.03);}
*{box-sizing:border-box}
body{
margin:0;
font-family:'Roboto Slab',serif;
color:var(--muted);
min-height:100vh;
background:#0b0b0b;
}
header{
padding:16px 20px;
display:flex;
align-items:center;
justify-content:space-between;
background:#000;
}
nav a{
color:var(--accent);
text-decoration:none;
font-weight:700;
margin-right:8px;
cursor:pointer;
}
main{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:12px;
max-width:100%;
margin:0 auto;
}
.card{
background:rgba(16,16,16,0.9);
border-radius:8px;
padding:12px;
border:1px solid rgba(255,255,255,0.05);
}
input,select{
width:100%;
padding:6px;
margin-top:4px;
background:#000;
color:#ddd;
border:1px solid #333;
}
button{
margin-top:10px;
padding:6px 10px;
background:var(--accent);
border:0;
cursor:pointer;
font-weight:bold;
}
table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}
td,th{
padding:6px;
border-bottom:1px solid #333;
}
#loginCard{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}
</style>
</head>

<body>

<div id="loginCard">
<div class="card" style="max-width:300px;width:100%">
<h2>Shelby Logistik</h2>
<input id="username" placeholder="Benutzer">
<input id="password" type="password" placeholder="Passwort">
<button id="loginBtn">Login</button>
<div id="errorMsg"></div>
</div>
</div>

<div id="dashboard" style="display:none">

<header>
<nav id="navLinks"></nav>
<button onclick="logout()">Logout</button>
</header>

<main>

<section id="inventory" class="card">
<h3>Inventar</h3>

<select id="invEmployee"></select>
<input id="material" placeholder="Material">
<input id="quantity" type="number" placeholder="Anzahl">

<button onclick="addInventory()">Eintragen</button>

<table id="inventoryTable">
<thead>
<tr>
<th>Mitarbeiter</th>
<th>Material</th>
<th>Anzahl</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="orders" class="card" style="display:none">
<h3>Aufträge</h3>

<input id="orderClient" placeholder="Kunde">
<input id="orderItem" placeholder="Bestellung">

<button onclick="addOrder()">Eintragen</button>

<table id="ordersTable">
<thead>
<tr>
<th>Kunde</th>
<th>Bestellung</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="payouts" class="card" style="display:none">
<h3>Auszahlungen</h3>

<select id="payEmployee"></select>
<input id="payAmount" type="number" placeholder="Betrag">

<button onclick="addPayout()">Auszahlen</button>

<table id="payoutTable">
<thead>
<tr>
<th>Mitarbeiter</th>
<th>Betrag</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="links" class="card" style="display:none">
<h3>Links</h3>

<input id="linkName" placeholder="Name">
<input id="linkURL" placeholder="URL">

<button onclick="addLink()">Hinzufügen</button>

<table id="linksTable">
<thead>
<tr>
<th>Name</th>
<th>Link</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="staff" class="card" style="display:none">
<h3>Mitarbeiter</h3>

<input id="staffName" placeholder="Name">
<button onclick="addStaff()">Hinzufügen</button>

<table id="staffTable">
<thead>
<tr>
<th>Name</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="history" class="card" style="display:none">
<h3>History</h3>

<table id="historyTable">
<thead>
<tr>
<th>Aktion</th>
<th>Datum</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

</main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAIGP9jBcFtGoPXMsz2Jm8sxNhYm6d1-sA",
authDomain: "roadrunner-runaway-86d6e.firebaseapp.com",
projectId: "roadrunner-runaway-86d6e",
storageBucket: "roadrunner-runaway-86d6e.firebasestorage.app",
messagingSenderId: "535598462149",
appId: "1:535598462149:web:8d72337fdc394b2a52acac"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const accounts=[
{user:"admin",pass:"shelby123",role:"admin"},
{user:"mitarbeiter",pass:"1234",role:"worker"},
{user:"verwalter",pass:"verwalter123",role:"manager"}
];

let role="worker";

loginBtn.onclick=()=>{

const u=username.value;
const p=password.value;

const acc=accounts.find(a=>a.user===u && a.pass===p);

if(!acc){
errorMsg.innerText="Login falsch";
return;
}

role=acc.role;
loginCard.style.display="none";
dashboard.style.display="block";

setupNav();
loadAll();

};

function logout(){location.reload()}

function setupNav(){

navLinks.innerHTML="";

navLinks.innerHTML+="<a onclick='show("inventory")'>Inventar</a>";
navLinks.innerHTML+="<a onclick='show("orders")'>Aufträge</a>";

if(role!=="worker"){
navLinks.innerHTML+="<a onclick='show("payouts")'>Auszahlungen</a>";
navLinks.innerHTML+="<a onclick='show("staff")'>Mitarbeiter</a>";
}

navLinks.innerHTML+="<a onclick='show("links")'>Links</a>";
navLinks.innerHTML+="<a onclick='show("history")'>History</a>";

}

function show(id){

["inventory","orders","payouts","links","staff","history"].forEach(s=>{

document.getElementById(s).style.display=(s===id)?"block":"none";

});

}

/* STAFF */

function loadStaff(){

db.collection("staff").onSnapshot(s=>{

staffTable.querySelector("tbody").innerHTML="";
invEmployee.innerHTML="";
payEmployee.innerHTML="";

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.name}</td>
<td><button onclick="deleteStaff('${doc.id}')">Löschen</button></td>
`;

staffTable.querySelector("tbody").appendChild(tr);

const opt=document.createElement("option");
opt.value=d.name;
opt.text=d.name;

invEmployee.add(opt.cloneNode(true));
payEmployee.add(opt.cloneNode(true));

});

});

}

function addStaff(){

db.collection("staff").add({name:staffName.value});

}

/* INVENTORY */

function loadInventory(){

db.collection("inventory").onSnapshot(s=>{

inventoryTable.querySelector("tbody").innerHTML="";

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.employee}</td>
<td>${d.material}</td>
<td>${d.quantity}</td>
<td><button onclick="deleteInventory('${doc.id}')">Entnommen</button></td>
`;

inventoryTable.querySelector("tbody").appendChild(tr);

});

});

}

function addInventory(){

db.collection("inventory").add({
employee:invEmployee.value,
material:material.value,
quantity:Number(quantity.value)
});

}

/* ORDERS */

function loadOrders(){

db.collection("orders").onSnapshot(s=>{

ordersTable.querySelector("tbody").innerHTML="";

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.client}</td>
<td>${d.item}</td>
<td><button onclick="deleteOrder('${doc.id}')">Erledigt</button></td>
`;

ordersTable.querySelector("tbody").appendChild(tr);

});

});

}

function addOrder(){

db.collection("orders").add({
client:orderClient.value,
item:orderItem.value
});

}

/* PAYOUTS */

function loadPayouts(){

db.collection("payouts").onSnapshot(s=>{

payoutTable.querySelector("tbody").innerHTML="";

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.employee}</td>
<td>${d.amount}€</td>
<td><button onclick="deletePayout('${doc.id}')">Löschen</button></td>
`;

payoutTable.querySelector("tbody").appendChild(tr);

});

});

}

function addPayout(){

db.collection("payouts").add({
employee:payEmployee.value,
amount:Number(payAmount.value)
});

}

/* LINKS */

function loadLinks(){

db.collection("links").onSnapshot(s=>{

linksTable.querySelector("tbody").innerHTML="";

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.name}</td>
<td><a href="${d.url}" target="_blank">${d.url}</a></td>
<td><button onclick="deleteLink('${doc.id}')">Löschen</button></td>
`;

linksTable.querySelector("tbody").appendChild(tr);

});

});

}

function addLink(){

db.collection("links").add({
name:linkName.value,
url:linkURL.value
});

}

/* HISTORY */

function addHistory(text){

db.collection("history").add({
action:text,
date:new Date().toLocaleString()
});

}

function loadHistory(){

db.collection("history").onSnapshot(s=>{

historyTable.querySelector("tbody").innerHTML="";

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.action}</td>
<td>${d.date}</td>
`;

historyTable.querySelector("tbody").appendChild(tr);

});

});

}

/* DELETE */

function deleteInventory(id){db.collection("inventory").doc(id).delete()}
function deleteOrder(id){db.collection("orders").doc(id).delete()}
function deletePayout(id){db.collection("payouts").doc(id).delete()}
function deleteStaff(id){db.collection("staff").doc(id).delete()}
function deleteLink(id){db.collection("links").doc(id).delete()}

/* LOAD */

function loadAll(){

loadStaff();
loadInventory();
loadOrders();
loadPayouts();
loadLinks();
loadHistory();

}

</script>

</body>
</html>
