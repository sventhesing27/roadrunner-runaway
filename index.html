
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shelby Logistik Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Roboto Slab',serif;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
color:#ddd;
}

header{
background:rgba(0,0,0,0.75);
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
margin-right:12px;
cursor:pointer;
color:#c9a06b;
font-weight:bold;
}

main{
padding:15px;
display:grid;
gap:15px;
}

.card{
background:rgba(0,0,0,0.75);
padding:15px;
border-radius:8px;
}

input,select{
width:100%;
padding:6px;
margin-top:5px;
}

button{
margin-top:10px;
padding:6px 10px;
background:#c9a06b;
border:0;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #444;
}

#loginCard{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}
</style>
</head>

<body>

<div id="loginCard">
<div class="card">
<h2>Shelby Login</h2>
<input id="username" placeholder="Benutzer">
<input id="password" type="password" placeholder="Passwort">
<button id="loginBtn">Login</button>
<div id="errorMsg"></div>
</div>
</div>

<div id="dashboard" style="display:none">

<header>
<nav id="navLinks"></nav>
<button onclick="logout()">Logout</button>
</header>

<main>

<section id="stats" class="card">
<h3>Statistik</h3>
<p>Mitarbeiter: <span id="statStaff">0</span></p>
<p>Inventar: <span id="statInventory">0</span></p>
<p>Links: <span id="statLinks">0</span></p>
</section>

<section id="staff" class="card" style="display:none">
<h3>Mitarbeiter Verwaltung</h3>

<input id="newEmployee" placeholder="Name">

<select id="newRole">
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="worker">Worker</option>
<option value="viewer">Viewer</option>
</select>

<button id="addStaff">Mitarbeiter erstellen</button>

<table id="staffTable">
<thead>
<tr>
<th>Name</th>
<th>Rolle</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="inventory" class="card" style="display:none">
<h3>Inventar</h3>

<select id="invEmployee"></select>

<input id="material" placeholder="Material">
<input id="quantity" type="number" placeholder="Anzahl">

<button id="addInv">Eintragen</button>

<table id="inventoryTable">
<thead>
<tr>
<th>Mitarbeiter</th>
<th>Material</th>
<th>Anzahl</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="links" class="card" style="display:none">
<h3>Links</h3>

<input id="linkName" placeholder="Name">
<input id="linkURL" placeholder="https://link.de">

<button id="addLink">Link hinzufügen</button>

<table id="linksTable">
<thead>
<tr>
<th>Name</th>
<th>Link</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="history" class="card" style="display:none">
<h3>History</h3>

<table id="historyTable">
<thead>
<tr>
<th>Aktion</th>
<th>Datum</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

</main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "PASTE_API_KEY",
authDomain: "PASTE_AUTH_DOMAIN",
projectId: "PASTE_PROJECT_ID",
storageBucket: "PASTE_STORAGE",
messagingSenderId: "PASTE_SENDER",
appId: "PASTE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const accounts=[
{user:'admin',pass:'shelby123'},
{user:'mitarbeiter',pass:'1234'},
{user:'verwalter',pass:'verwalter123'}
];

let currentRole="viewer"

loginBtn.onclick=()=>{

const u=username.value.trim()
const p=password.value.trim()

const acc=accounts.find(a=>a.user===u && a.pass===p)

if(!acc){
errorMsg.innerText="Falscher Login"
return
}

loginCard.style.display="none"
dashboard.style.display="block"

loadRole(u)
loadAll()

}

function logout(){
location.reload()
}

function loadRole(user){

db.collection("roles").doc(user).get().then(doc=>{

if(doc.exists){
currentRole=doc.data().role
}

setupNav()

})

}

function setupNav(){

navLinks.innerHTML=""

navLinks.innerHTML+="<a onclick=\"showSection('stats')\">Statistik</a>"
navLinks.innerHTML+="<a onclick=\"showSection('inventory')\">Inventar</a>"
navLinks.innerHTML+="<a onclick=\"showSection('links')\">Links</a>"
navLinks.innerHTML+="<a onclick=\"showSection('history')\">History</a>"

if(currentRole==="admin"||currentRole==="manager"){
navLinks.innerHTML+="<a onclick=\"showSection('staff')\">Mitarbeiter</a>"
}

}

function showSection(id){

["stats","staff","inventory","links","history"].forEach(s=>{

const el=document.getElementById(s)
if(el) el.style.display=(s===id)?"block":"none"

})

}

/* STAFF */

function loadStaff(){

db.collection("staff").onSnapshot(s=>{

staffTable.querySelector("tbody").innerHTML=""
invEmployee.innerHTML=""

let count=0

s.forEach(doc=>{

const d=doc.data()
count++

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.name}</td>
<td>${d.role}</td>
<td><button onclick="deleteStaff('${doc.id}')">Löschen</button></td>
`

staffTable.querySelector("tbody").appendChild(tr)

const opt=document.createElement("option")
opt.text=d.name
opt.value=d.name

invEmployee.add(opt)

})

statStaff.innerText=count

})

}

addStaff.onclick=()=>{

const name=newEmployee.value
const role=newRole.value

db.collection("staff").add({
name:name,
role:role
})

db.collection("roles").doc(name).set({
role:role
})

}

/* INVENTORY */

function loadInventory(){

db.collection("inventory").onSnapshot(s=>{

inventoryTable.querySelector("tbody").innerHTML=""

let count=0

s.forEach(doc=>{

const e=doc.data()
count++

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${e.employee}</td>
<td>${e.material}</td>
<td>${e.quantity}</td>
<td><button onclick="deleteInventory('${doc.id}')">Entnommen</button></td>
`

inventoryTable.querySelector("tbody").appendChild(tr)

})

statInventory.innerText=count

})

}

addInv.onclick=()=>{

db.collection("inventory").add({
employee:invEmployee.value,
material:material.value,
quantity:Number(quantity.value)
})

}

/* LINKS */

function loadLinks(){

db.collection("links").onSnapshot(s=>{

linksTable.querySelector("tbody").innerHTML=""

let count=0

s.forEach(doc=>{

const l=doc.data()
count++

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${l.name}</td>
<td><a href="${l.url}" target="_blank">${l.url}</a></td>
<td><button onclick="deleteLink('${doc.id}')">Löschen</button></td>
`

linksTable.querySelector("tbody").appendChild(tr)

})

statLinks.innerText=count

})

}

addLink.onclick=()=>{

db.collection("links").add({
name:linkName.value,
url:linkURL.value
})

}

/* HISTORY */

function loadHistory(){

db.collection("history").onSnapshot(s=>{

historyTable.querySelector("tbody").innerHTML=""

s.forEach(doc=>{

const d=doc.data()

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.action}</td>
<td>${d.date}</td>
<td><button onclick="deleteHistory('${doc.id}')">Löschen</button></td>
`

historyTable.querySelector("tbody").appendChild(tr)

})

})

}

/* DELETE FUNCTIONS */

function deleteStaff(id){
db.collection("staff").doc(id).delete()
}

function deleteInventory(id){
db.collection("inventory").doc(id).delete()
}

function deleteLink(id){
db.collection("links").doc(id).delete()
}

function deleteHistory(id){
db.collection("history").doc(id).delete()
}

/* LOAD */

function loadAll(){
loadStaff()
loadInventory()
loadLinks()
loadHistory()
}

</script>

</body>
</html>
