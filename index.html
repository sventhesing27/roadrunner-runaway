<!DOCTYPE html>
<html>
<head>

<title>ROADRUNNER RUNAWAY</title>

<style>

body{
background-image:url("background.jpg");
background-size:cover;
background-position:center;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.panel{
background:rgba(0,0,0,0.8);
padding:30px;
margin:60px auto;
width:500px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
}

#adminpanel,#memberpanel{
display:none;
}

audio{
width:90%;
margin:10px;
}

</style>

</head>

<body>

<div class="panel" id="login">

<h1>ROADRUNNER RUNAWAY</h1>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="error"></p>

</div>


<div class="panel" id="memberpanel">

<h2>Memberbereich</h2>

<p>Musik nur für Mitglieder</p>

<h3>Playlist</h3>

<audio controls src="music/song1.mp3"></audio>
<audio controls src="music/song2.mp3"></audio>
<audio controls src="music/song3.mp3"></audio>

<button onclick="logout()">Logout</button>

</div>


<div class="panel" id="adminpanel">

<h2>Adminbereich</h2>

<p>Hier kannst du Member verwalten</p>

<input id="newuser" placeholder="Neuer Member">
<input id="newpass" placeholder="Passwort">

<button onclick="addMember()">Member hinzufügen</button>

<h3>Mitglieder</h3>

<div id="memberlist"></div>

<button onclick="logout()">Logout</button>

</div>


<script>

let adminUser="admin"
let adminPass="roadrunner"

if(!localStorage.members){
localStorage.members=JSON.stringify([])
}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===adminUser && p===adminPass){

document.getElementById("login").style.display="none"
document.getElementById("adminpanel").style.display="block"

loadMembers()

return
}

let members=JSON.parse(localStorage.members)

for(let m of members){

if(m.user===u && m.pass===p){

document.getElementById("login").style.display="none"
document.getElementById("memberpanel").style.display="block"

return
}

}

document.getElementById("error").innerText="Login falsch"

}

function logout(){

location.reload()

}

function addMember(){

let u=document.getElementById("newuser").value
let p=document.getElementById("newpass").value

let members=JSON.parse(localStorage.members)

members.push({user:u,pass:p})

localStorage.members=JSON.stringify(members)

loadMembers()

}

function deleteMember(name){

let members=JSON.parse(localStorage.members)

members=members.filter(m=>m.user!==name)

localStorage.members=JSON.stringify(members)

loadMembers()

}

function loadMembers(){

let members=JSON.parse(localStorage.members)

let html=""

for(let m of members){

html+=m.user+" <button onclick='deleteMember(\""+m.user+"\")'>löschen</button><br>"

}

document.getElementById("memberlist").innerHTML=html

}

</script>

</body>
</html>
