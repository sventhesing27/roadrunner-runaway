<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadrunner Runaways</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
--panel: rgba(16,16,16,0.9);
--accent:#c9a06b;
--muted:#bfb7ad;
}

body{
margin:0;
font-family:'Roboto Slab',serif;
color:var(--muted);
background:url("background.jpg") no-repeat center center fixed;
background-size:cover;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.7);
}

nav a{
color:var(--accent);
margin-right:12px;
cursor:pointer;
font-weight:bold;
}

main{
padding:15px;
display:grid;
gap:15px;
}

.card{
background:var(--panel);
padding:15px;
border-radius:8px;
}

input,select{
width:100%;
padding:6px;
margin-top:5px;
background:#000;
border:1px solid #333;
color:white;
}

button{
margin-top:10px;
padding:6px 10px;
background:var(--accent);
border:0;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #333;
}

#loginCard{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}
</style>
</head>

<body>

<div id="loginCard">
<div class="card" style="width:320px;text-align:center;">
<h2>Herzlich Willkommen</h2>
<input id="username" placeholder="Benutzer">
<input id="password" type="password" placeholder="Passwort">
<button id="loginBtn">Login</button>
<div id="error"></div>
</div>
</div>

<div id="dashboard" style="display:none">

<header>
<nav>
<a onclick="show('stats')">Statistik</a>
<a onclick="show('staff')">Mitarbeiter</a>
<a onclick="show('inventory')">Inventar</a>
<a onclick="show('orders')">Aufträge</a>
<a onclick="show('links')">Links</a>
<a onclick="show('history')">History</a>
</nav>
<button onclick="logout()">Logout</button>
</header>

<main>

<section id="stats" class="card">
<h3>Statistik</h3>
<p>Mitarbeiter: <span id="statStaff">0</span></p>
<p>Inventar: <span id="statInventory">0</span></p>
<p>Aufträge: <span id="statOrders">0</span></p>
<p>Links: <span id="statLinks">0</span></p>
</section>

<section id="staff" class="card" style="display:none">
<h3>Mitarbeiter</h3>
<input id="staffName" placeholder="Name">
<button onclick="addStaff()">Hinzufügen</button>
<table id="staffTable">
<thead><tr><th>Name</th><th></th></tr></thead>
<tbody></tbody>
</table>
</section>

<section id="inventory" class="card" style="display:none">
<h3>Inventar</h3>
<select id="invEmployee"></select>
<input id="material" placeholder="Material">
<input id="quantity" type="number" placeholder="Anzahl">
<input id="price" type="number" placeholder="Preis">
<button onclick="addInventory()">Eintragen</button>

<table id="inventoryTable">
<thead><tr><th>Mitarbeiter</th><th>Material</th><th>Anzahl</th><th>Preis</th><th></th></tr></thead>
<tbody></tbody>
</table>
</section>

<section id="orders" class="card" style="display:none">
<h3>Aufträge</h3>
<input id="orderClient" placeholder="Kunde">
<input id="orderItem" placeholder="Bestellung">
<button onclick="addOrder()">Eintragen</button>
<table id="ordersTable">
<thead><tr><th>Kunde</th><th>Bestellung</th><th></th></tr></thead>
<tbody></tbody>
</table>
</section>

<section id="links" class="card" style="display:none">
<h3>Links</h3>
<input id="linkName" placeholder="Name">
<input id="linkURL" placeholder="URL">
<button onclick="addLink()">Link hinzufügen</button>
<table id="linksTable">
<thead><tr><th>Name</th><th>URL</th><th></th></tr></thead>
<tbody></tbody>
</table>
</section>

<section id="history" class="card" style="display:none">
<h3>History</h3>
<table id="historyTable">
<thead><tr><th>Datum</th><th>Aktion</th></tr></thead>
<tbody></tbody>
</table>
</section>

</main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE KONFIG EINTRAGEN */
const firebaseConfig={
apiKey: "AIzaSyAIGP9jBcFtGoPXMsz2Jm8sxNhYm6d1-sA",
  authDomain: "roadrunner-runaway-86d6e.firebaseapp.com",
  databaseURL: "https://roadrunner-runaway-86d6e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "roadrunner-runaway-86d6e",
  storageBucket: "roadrunner-runaway-86d6e.firebasestorage.app",
  messagingSenderId: "535598462149",
  appId: "1:535598462149:web:8d72337fdc394b2a52acac"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const users=[
{user:"admin",pass:"Run",role:"admin"},
{user:"pilot",pass:"0815",role:"pilot"},
{user:"verwalter",pass:"Run",role:"verwalter"}
];

let currentRole="";

loginBtn.onclick=function(){

const u=username.value.trim();
const p=password.value.trim();

const acc=users.find(x=>x.user===u && x.pass===p);

if(!acc){
error.innerText="Login falsch";
return;
}

loginCard.style.display="none";
dashboard.style.display="block";

loadAll();

}

function logout(){location.reload()}

function show(id){
["stats","staff","inventory","orders","links","history"].forEach(s=>{
document.getElementById(s).style.display=(s===id)?"block":"none"
})
}

/* STAFF */

function loadStaff(){
db.collection("staff").onSnapshot(s=>{

staffTable.querySelector("tbody").innerHTML="";
invEmployee.innerHTML="";
statStaff.innerText=s.size;

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");
tr.innerHTML=`<td>${d.name}</td><td><button onclick="deleteStaff('${doc.id}')">Löschen</button></td>`;
staffTable.querySelector("tbody").appendChild(tr);

const opt=document.createElement("option");
opt.value=d.name;
opt.text=d.name;
invEmployee.add(opt);

});

});
}

function addStaff(){
if(!staffName.value) return;
db.collection("staff").add({name:staffName.value});
addHistory("Mitarbeiter erstellt");
}

function deleteStaff(id){
db.collection("staff").doc(id).delete();
}

/* INVENTORY */

function loadInventory(){
db.collection("inventory").onSnapshot(s=>{

inventoryTable.querySelector("tbody").innerHTML="";
statInventory.innerText=s.size;

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");
tr.innerHTML=`
<td>${d.employee}</td>
<td>${d.material}</td>
<td>${d.quantity}</td>
<td>${d.price}</td>
<td><button onclick="deleteInventory('${doc.id}')">Entnommen</button></td>`;

inventoryTable.querySelector("tbody").appendChild(tr);

});

});
}

function addInventory(){
db.collection("inventory").add({
employee:invEmployee.value,
material:material.value,
quantity:Number(quantity.value),
price:Number(price.value)
});
addHistory("Inventar hinzugefügt");
}

function deleteInventory(id){
db.collection("inventory").doc(id).delete();
}

/* ORDERS */

function loadOrders(){
db.collection("orders").onSnapshot(s=>{

ordersTable.querySelector("tbody").innerHTML="";
statOrders.innerText=s.size;

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");
tr.innerHTML=`
<td>${d.client}</td>
<td>${d.item}</td>
<td><button onclick="deleteOrder('${doc.id}')">Erledigt</button></td>`;

ordersTable.querySelector("tbody").appendChild(tr);

});

});
}

function addOrder(){
db.collection("orders").add({
client:orderClient.value,
item:orderItem.value
});
addHistory("Auftrag erstellt");
}

function deleteOrder(id){
db.collection("orders").doc(id).delete();
}

/* LINKS */

function loadLinks(){
db.collection("links").onSnapshot(s=>{

linksTable.querySelector("tbody").innerHTML="";
statLinks.innerText=s.size;

s.forEach(doc=>{

const d=doc.data();

const tr=document.createElement("tr");
tr.innerHTML=`
<td>${d.name}</td>
<td><a href="${d.url}" target="_blank">${d.url}</a></td>
<td><button onclick="deleteLink('${doc.id}')">Löschen</button></td>`;

linksTable.querySelector("tbody").appendChild(tr);

});

});
}

function addLink(){
db.collection("links").add({
name:linkName.value,
url:linkURL.value
});
addHistory("Link erstellt");
}

function deleteLink(id){
db.collection("links").doc(id).delete();
}

/* HISTORY */

function addHistory(action){
db.collection("history").add({
date:new Date().toLocaleString(),
action:action
});
}

function loadHistory(){
db.collection("history").onSnapshot(s=>{

historyTable.querySelector("tbody").innerHTML="";

s.forEach(doc=>{

const h=doc.data();
const tr=document.createElement("tr");
tr.innerHTML=`<td>${h.date}</td><td>${h.action}</td>`;
historyTable.querySelector("tbody").appendChild(tr);

});

});
}

function loadAll(){
loadStaff();
loadInventory();
loadOrders();
loadLinks();
loadHistory();
}

</script>

</body>
</html>
