
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shelby Logistik Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#0b0b0b;--panel:#101010;--accent:#c9a06b;--muted:#bfb7ad;--glass: rgba(255,255,255,0.03);}
*{box-sizing:border-box}

body{
margin:0;
font-family:'Roboto Slab',serif;
color:var(--muted);
min-height:100vh;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

header{
padding:16px 20px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(0,0,0,0.5);
}

nav a{
color:var(--accent);
text-decoration:none;
font-weight:700;
margin-right:10px;
cursor:pointer;
}

main{
display:grid;
gap:12px;
padding:12px;
}

.card{
background:rgba(16,16,16,0.85);
border-radius:8px;
padding:12px;
}

input,select{
width:100%;
padding:6px;
margin-top:4px;
border-radius:6px;
border:1px solid rgba(255,255,255,0.04);
background:var(--glass);
color:var(--muted);
}

button{
margin-top:10px;
padding:6px 10px;
border-radius:6px;
border:0;
background:var(--accent);
color:#000;
font-weight:700;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:6px;
border-bottom:1px dashed rgba(255,255,255,0.1);
}

#loginCard{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
</style>
</head>

<body>

<div id="loginCard">
<div class="card" style="width:300px;text-align:center">
<h2>Shelby Logistik</h2>
<input id="username" placeholder="Benutzername">
<input id="password" type="password" placeholder="Passwort">
<button id="loginBtn">Login</button>
<div id="errorMsg"></div>
</div>
</div>

<div id="dashboard" style="display:none">

<header>
<nav id="navLinks"></nav>
<button onclick="logout()">Logout</button>
</header>

<main>

<section id="konto" class="card">
<h3>Kontostand</h3>

<input id="kontoValue" placeholder="Neuer Kontostand">
<button id="saveKonto">Speichern</button>

<h2 id="kontoDisplay">0 €</h2>

</section>

<section id="station" class="card" style="display:none">
<h3>Aktuelle Baustation</h3>

<input id="stationName" placeholder="Station Name">
<input id="stationBuilder" placeholder="Wer baut">

<button id="saveStation">Speichern</button>

<table id="stationTable">
<thead>
<tr>
<th>Station</th>
<th>Builder</th>
<th>Status</th>
<th>Aktion</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="payouts" class="card" style="display:none">

<h3>Mitarbeiter Auszahlung</h3>

<select id="payEmployee"></select>
<input id="payAmount" type="number" placeholder="Betrag">

<button id="addPayout">Auszahlen</button>

<table id="payoutTable">
<thead>
<tr>
<th>Mitarbeiter</th>
<th>Betrag</th>
<th>Datum</th>
</tr>
</thead>
<tbody></tbody>
</table>

</section>

<section id="inventory" class="card" style="display:none">
<h3>Inventar</h3>

<select id="invEmployee"></select>
<input id="material" placeholder="Material">
<input id="quantity" type="number" placeholder="Anzahl">
<input id="price" type="number" placeholder="Preis">

<button id="addInv">Eintragen</button>

<table id="entriesTable">
<thead>
<tr>
<th>Mitarbeiter</th>
<th>Material</th>
<th>Anzahl</th>
<th>Preis</th>
<th>Aktion</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="staff" class="card" style="display:none">
<h3>Mitarbeiter</h3>

<input id="newEmployee" placeholder="Name">
<button id="addStaff">Hinzufügen</button>

<table id="staffTable">
<thead><tr><th>Name</th><th>Aktion</th></tr></thead>
<tbody></tbody>
</table>

</section>

<section id="links" class="card" style="display:none">
<h3>Links</h3>

<input id="linkName" placeholder="Name">
<input id="linkURL" placeholder="https://link.de">

<button id="addLink">Hinzufügen</button>

<table id="linksTable">
<thead><tr><th>Name</th><th>Link</th><th>Aktion</th></tr></thead>
<tbody></tbody>
</table>

</section>

</main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAIGP9jBcFtGoPXMsz2Jm8sxNhYm6d1-sA",
authDomain: "roadrunner-runaway-86d6e.firebaseapp.com",
projectId: "roadrunner-runaway-86d6e",
storageBucket: "roadrunner-runaway-86d6e.firebasestorage.app",
messagingSenderId: "535598462149",
appId: "1:535598462149:web:8d72337fdc394b2a52acac"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const accounts=[
{user:'admin',pass:'shelby123'},
{user:'mitarbeiter',pass:'1234'},
{user:'verwalter',pass:'verwalter123'}
];

loginBtn.onclick=()=>{

const acc=accounts.find(a=>a.user===username.value && a.pass===password.value)

if(acc){

loginCard.style.display="none"
dashboard.style.display="block"

setupNav()

loadKonto()
loadStation()
loadStaff()
loadInventory()
loadLinks()
loadPayouts()

}else{
errorMsg.innerText="Falscher Login"
}

}

function logout(){location.reload()}

function setupNav(){

navLinks.innerHTML=""
navLinks.innerHTML+="<a onclick=\"showSection('konto')\">Konto</a>"
navLinks.innerHTML+="<a onclick=\"showSection('station')\">Station</a>"
navLinks.innerHTML+="<a onclick=\"showSection('payouts')\">Auszahlung</a>"
navLinks.innerHTML+="<a onclick=\"showSection('inventory')\">Inventar</a>"
navLinks.innerHTML+="<a onclick=\"showSection('staff')\">Mitarbeiter</a>"
navLinks.innerHTML+="<a onclick=\"showSection('links')\">Links</a>"

}

function showSection(id){

["konto","station","payouts","inventory","staff","links"].forEach(s=>{
document.getElementById(s).style.display=(s===id)?"block":"none"
})

}

/* KONTO */

function loadKonto(){

db.collection("konto").doc("main").onSnapshot(doc=>{

if(doc.exists){
kontoDisplay.innerText=doc.data().value+" €"
}

})

}

saveKonto.onclick=()=>{

db.collection("konto").doc("main").set({
value:Number(kontoValue.value)
})

kontoValue.value=""

}

/* PAYOUTS */

function loadPayouts(){

db.collection("payouts").onSnapshot(s=>{

payoutTable.querySelector("tbody").innerHTML=""

s.forEach(doc=>{

const d=doc.data()

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.employee}</td>
<td>${d.amount} €</td>
<td>${d.date}</td>
`

payoutTable.querySelector("tbody").appendChild(tr)

})

})

}

addPayout.onclick=()=>{

db.collection("payouts").add({
employee:payEmployee.value,
amount:Number(payAmount.value),
date:new Date().toLocaleString()
})

}

/* STAFF */

function loadStaff(){

db.collection("staff").onSnapshot(s=>{

staffTable.querySelector("tbody").innerHTML=""
invEmployee.innerHTML=""
payEmployee.innerHTML=""

s.forEach(doc=>{

const d=doc.data()

const tr=document.createElement("tr")

tr.innerHTML=`<td>${d.name}</td>
<td><button onclick="deleteStaff('${doc.id}')">Löschen</button></td>`

staffTable.querySelector("tbody").appendChild(tr)

const opt=document.createElement("option")
opt.text=d.name
opt.value=d.name

invEmployee.add(opt)
payEmployee.add(opt.cloneNode(true))

})

})

}

addStaff.onclick=()=>{

const n=newEmployee.value.trim()
if(!n)return

db.collection("staff").add({name:n})

newEmployee.value=""

}

function deleteStaff(id){

db.collection("staff").doc(id).delete()

}

/* INVENTORY */

function loadInventory(){

db.collection("inventory").onSnapshot(s=>{

entriesTable.querySelector("tbody").innerHTML=""

s.forEach(doc=>{

const e=doc.data()

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${e.employee}</td>
<td>${e.material}</td>
<td>${e.quantity}</td>
<td>${e.price}</td>
<td><button onclick="deleteInventory('${doc.id}')">Entnommen</button></td>
`

entriesTable.querySelector("tbody").appendChild(tr)

})

})

}

addInv.onclick=()=>{

const e={
employee:invEmployee.value,
material:material.value,
quantity:Number(quantity.value),
price:Number(price.value)
}

db.collection("inventory").add(e)

}

/* STATION */

function loadStation(){

db.collection("station").onSnapshot(s=>{

stationTable.querySelector("tbody").innerHTML=""

s.forEach(doc=>{

const d=doc.data()

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.name}</td>
<td>${d.builder}</td>
<td>${d.status}</td>
<td><button onclick="deleteStation('${doc.id}')">Fertig</button></td>
`

stationTable.querySelector("tbody").appendChild(tr)

})

})

}

saveStation.onclick=()=>{

db.collection("station").add({
name:stationName.value,
builder:stationBuilder.value,
status:"Wird gebaut"
})

}

/* LINKS */

function loadLinks(){

db.collection("links").onSnapshot(s=>{

linksTable.querySelector("tbody").innerHTML=""

s.forEach(doc=>{

const l=doc.data()

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${l.name}</td>
<td><a href="${l.url}" target="_blank">${l.url}</a></td>
<td><button onclick="deleteLink('${doc.id}')">Löschen</button></td>
`

linksTable.querySelector("tbody").appendChild(tr)

})

})

}

addLink.onclick=()=>{

db.collection("links").add({
name:linkName.value,
url:linkURL.value
})

}

</script>

</body>
</html>
