<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Shelby System (Firebase)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginCard" class="login-card">
<h2>Login</h2>
<input id="username" placeholder="Benutzername">
<input id="password" type="password" placeholder="Passwort">
<button id="loginBtn">Login</button>
<p id="errorMsg"></p>
</div>

<div id="dashboard" style="display:none">
<h1>Dashboard</h1>

<nav>
<button onclick="showSection('inventory')">Inventar</button>
<button onclick="showSection('orders')">Aufträge</button>
<button onclick="showSection('staff')">Mitarbeiter</button>
</nav>

<section id="inventory">
<h2>Inventar</h2>
<select id="invEmployee"></select>
<input id="material" placeholder="Material">
<input id="quantity" type="number" placeholder="Menge">
<input id="price" type="number" placeholder="Preis">
<button id="addInv">Hinzufügen</button>

<table id="entriesTable">
<thead>
<tr>
<th>Mitarbeiter</th>
<th>Material</th>
<th>Menge</th>
<th>Preis</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="orders" style="display:none">
<h2>Aufträge</h2>
<input id="orderClient" placeholder="Kunde">
<input id="orderItem" placeholder="Auftrag">
<button id="addOrder">Hinzufügen</button>

<table id="orderTable">
<thead>
<tr>
<th>Kunde</th>
<th>Auftrag</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

<section id="staff" style="display:none">
<h2>Mitarbeiter</h2>
<input id="newEmployee" placeholder="Name">
<button id="addStaff">Hinzufügen</button>

<table id="staffTable">
<thead><tr><th>Name</th></tr></thead>
<tbody></tbody>
</table>
</section>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>

</body>
</html>
